name: Publish to npm (with provenance)

# n8n's verified-community-node program requires (from 2026-05-01) that packages
# are published from GitHub Actions with an npm provenance statement, signed via
# GitHub's OIDC infrastructure. n8n will NOT verify nodes published from a local
# machine. See https://docs.npmjs.com/generating-provenance-statements.
#
# Publishing is triggered by pushing a git tag like `v0.3.0`.
#
# ── ONE-TIME npm SETUP ─────────────────────────────────────────────────────────
# Recommended — OIDC Trusted Publishing (no long-lived secret):
#   npmjs.com -> the n8n-nodes-pisama package -> Settings -> Trusted Publishers
#   -> Add GitHub Actions: repo `Pisama-AI/n8n-nodes-pisama`, workflow `publish.yml`.
#   Leave NPM_TOKEN unset; the GitHub OIDC identity authenticates the publish.
# Fallback — Automation token:
#   Create a Granular Access Token (read+write for this package) and add it as the
#   repo secret NPM_TOKEN.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # OIDC: required for npm provenance AND trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm >= 11.5.1, required for OIDC trusted publishing.
          node-version: '24.x'

      # --ignore-scripts skips the dev-only native build (isolated-vm, pulled
      # transitively by @n8n/node-cli) that n8n-node build/lint never load.
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Publish with provenance
        # Trusted Publishing (recommended): NPM_TOKEN unset -> npm authenticates
        # via GitHub OIDC, no stored secret. Token fallback: set NPM_TOKEN and it
        # is written to the registry auth before publishing.
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
