name: Publish to npm

# n8n's verified-community-node program requires (from 2026-05-01) that packages
# are published from GitHub Actions with an npm provenance statement, signed via
# GitHub's OIDC infrastructure. n8n will NOT verify nodes published from a local
# machine. See https://docs.npmjs.com/generating-provenance-statements.
#
# Publishing is triggered by pushing a git tag like `v0.3.0`.
#
# One-time npm setup:
# OIDC Trusted Publishing (no long-lived secret):
#   npmjs.com -> the n8n-nodes-pisama package -> Settings -> Trusted Publishers
#   -> Add GitHub Actions: repo `Pisama-AI/n8n-nodes-pisama`, workflow `publish.yml`.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org

      # --ignore-scripts skips the dev-only native build (isolated-vm, pulled
      # transitively by @n8n/node-cli) that n8n-node build/lint never load.
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Enforce complexity ceiling
        run: npm run quality:complexity

      - name: Test with coverage gates
        run: npm run test:coverage

      - name: Audit production dependencies
        run: npm run audit:production

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          test "$TAG_VERSION" = "$PACKAGE_VERSION"

      - name: Pack publish artifact
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          npm pack --pack-destination "$RUNNER_TEMP/release"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: package
          path: ${{ runner.temp }}/release/*.tgz

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: required for npm provenance and trusted publishing
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: package
          path: dist/

      - name: Publish through npm trusted publishing
        run: npm publish dist/*.tgz --access public
